Descriptor:
  Name: AzurePolicyManager
  DisplayName: Azure Policy Manager
  Description: Plugin to query Azure Policy definitions, retrieve compliance states, list unhealthy resources, trigger evaluations, and generate compliance summaries.
  DescriptionForModel: Use this plugin to access Azure Policy data. It can retrieve lists of non-compliant (unhealthy) resources, summarize compliance states for reporting, look up policy definitions by name (both custom and built-in), and trigger compliance scans.
  SupportedAuthTypes:
    - AADDelegated
  Authorization:
    Type: AADDelegated
    EntraScopes: https://management.azure.com/user_impersonation
SkillGroups:
  - Format: API
    Settings:
      # Upload newManifestAzurePolicy90.yaml to a GitHub Gist and replace this URL
      OpenApiSpecUrl: https://gist.githubusercontent.com/the-sentinental-guy/REPLACE_WITH_NEW_GIST_RAW_URL/raw/newManifestAzurePolicy90.yaml
