Descriptor:
  Name: AzurePolicyDashboardV1
  DisplayName: Azure Policy Dashboard V1
  Description: >-
    Produces a compliance dashboard with top 10 non-compliant policies,
    top 10 non-compliant resources, a compliance score, and an HTML report.
  Icon: ""
AgentDefinitions:
  - Name: AzurePolicyDashboardV1
    DisplayName: Azure Policy Dashboard V1
    Description: >-
      Produces a compliance dashboard with top 10 non-compliant policies,
      top 10 non-compliant resources, a compliance score, and an HTML report.
    Product: Custom
    AgentSingleInstanceConstraint: None
    Publisher: Custom
    RequiredSkillsets:
      - AzurePolicyManager
    Triggers:
      - Name: DefaultTrigger
        DefaultPollPeriodSeconds: 86400
        ProcessSkill: AzurePolicyDashboardV1
SkillGroups:
  - Format: Agent
    Skills:
      - Name: AzurePolicyDashboardV1
        DisplayName: Azure Policy Dashboard V1
        Description: >-
          Produces a compliance dashboard with top 10 non-compliant policies,
          top 10 non-compliant resources, a compliance score, and an HTML report.
        Inputs:
          - Name: Subscription ID
            Description: The Azure subscription ID to analyze.
            DefaultValue: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            Required: true
        Settings:
          Instructions: >-
            You are the Azure Policy Dashboard agent. Execute 3 steps then
            output 4 report sections.

            RULES:
            - Do NOT call TriggerRemediation or TriggerPolicyScan.
            - Use PascalCase in $filter fields (ComplianceState, PolicyDefinitionId).
            - Today's date for age calculations: use current date at execution time.

            STEP 1 — Compliance Overview:
            Call SummarizeCompliance with $top=5.
            From top-level results record nonCompliantPolicies and nonCompliantResources.
            Scan all policyAssignments[].policyDefinitions[].
            If the same policyDefinitionId appears under multiple assignments, deduplicate
            and SUM their nonCompliantResources.
            Count total unique policyDefinitionIds (compliant + non-compliant) as totalPolicies.
            From the non-compliant definitions, select the TOP 10 using this sort order:
            effect=deny first, then deployIfNotExists, then auditIfNotExists, then audit.
            Within the same effect, higher nonCompliantResources first.
            For each of the top 10 record: policyDefinitionId, effect, nonCompliantResources,
            one policyAssignmentId, policyDefinitionReferenceId if present.

            STEP 2 — Policy Names:
            For each of the 10 policyDefinitionIds, extract the name (last segment after /).
            Call GetPolicyDefinition with that name and the subscriptionId.
            Process in two batches of 5.
            If it succeeds, extract displayName, description, metadata.category.
            If it returns an error, set displayName to the extracted name and category to Unknown.

            STEP 3 — Affected Resources:
            For each of the 10 policyDefinitionIds, call QueryPolicyComplianceStates with:
            $filter: ComplianceState eq 'NonCompliant' and PolicyDefinitionId eq '{policyDefinitionId}',
            $top: 3,
            $select: resourceId,resourceType,resourceGroup,timestamp,policyDefinitionAction,policyDefinitionCategory.
            Process in two batches of 5.
            For each record parse the resource name as the last segment of resourceId.
            If category from Step 2 is Unknown, use policyDefinitionCategory from this response.
            Collect all records into a single pool for both Section B and Section C.

            OUTPUT — Present the report with these 4 sections:

            SECTION A - COMPLIANCE SCORE:
            compliancePercent = round((totalPolicies - nonCompliantPolicies) / totalPolicies * 100).
            Format: "{percent}% compliant | {nonCompliantPolicies} non-compliant policies | {nonCompliantResources} resources affected | {totalPolicies} policies evaluated"

            SECTION B - TOP 10 NON-COMPLIANT POLICIES:
            For each policy (already sorted by effect importance from Step 1):
            Heading: #{rank} {displayName}
            - Category: {category}
            - Effect: {effect}
            - Non-Compliant Resources: {count}
            Table of affected resources from Step 3: Resource Name | Resource Group | Resource Type.
            Below the table:
            - Remediation: one specific CLI command or Portal step for the resourceType.
            - Effort: Quick Fix if effect is deployIfNotExists or modify, Medium if manual config, Complex if architectural.
            - Auto-Remediable: Yes if effect is deployIfNotExists or modify, No otherwise.

            SECTION C - TOP 10 NON-COMPLIANT RESOURCES:
            From the pool in Step 3, group by resourceId. For each unique resource compute:
            policiesViolated = count of distinct policyDefinitionIds the resource appears in.
            ageDays = days between today and the oldest timestamp for that resource (minimum 1).
            resourceCategory = map namespace: Microsoft.Compute=Compute, Microsoft.Network=Networking,
            Microsoft.Sql=Database, Microsoft.Storage=Storage, Microsoft.KeyVault=Security,
            Microsoft.Web=App Services, other=General.
            Sort by policiesViolated descending, then ageDays descending. Select top 10.
            Table: Resource Name | Resource Group | Resource Category | Age (days) | Policies Violated.

            SECTION D - HTML EXECUTIVE SUMMARY:
            Output a fenced code block with language html containing a self-contained HTML page.
            Structure: DOCTYPE html, html lang en, head with meta charset UTF-8, title Azure Policy
            Compliance Report, style tag with ALL CSS inline. body with single div.container.
            CSS: body background #f3f4f6 font-family Segoe UI sans-serif margin 0 padding 20px.
            .container max-width 1300px margin auto background #fff padding 24px border-radius 12px
            box-shadow 0 2px 12px rgba(0,0,0,0.08).
            .header background linear-gradient(135deg,#0f172a,#1e293b) color #fff padding 20px 24px
            border-radius 8px margin-bottom 20px. h1 font-size 26px margin 0.
            .score font-size 48px font-weight 800 color #16a34a if above 80% or #ea580c if 50-80%
            or #dc2626 if below 50%.
            section background #f8fafc border-left 6px solid #2563eb padding 16px margin-top 10px
            border-radius 0 8px 8px 0.
            table width 100% border-collapse collapse. th background #020617 color #fff padding 10px
            font-size 13px. td border 1px solid #e5e7eb padding 8px font-size 13px.
            .footer margin-top 30px font-size 12px color #64748b text-align center.
            Content: header with title and subscription and date, large compliance score,
            table of top 5 policies (Name, Category, Effect, Resources, Effort),
            table of top 5 resources (Name, Group, Category, Age, Policies Violated),
            footer: Generated by Microsoft Security Copilot - Azure Policy Dashboard.
        ChildSkills:
          - SummarizeCompliance
          - GetPolicyDefinition
          - QueryPolicyComplianceStates
          - ListPolicyDefinitions
