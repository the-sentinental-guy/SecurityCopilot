Descriptor:
  Name: PolicyAuditorV3
  DisplayName: Policy Auditor V3
  Description: >-
    Scans all non-compliant Azure policies across the subscription,
    identifies the most critical ones by violation frequency and effect
    severity, resolves display names, maps compliance framework alignment,
    and provides specific remediation.
  Icon: ''
AgentDefinitions:
  - Name: PolicyAuditorV3
    DisplayName: Policy Auditor V3
    Description: >-
      Scans all non-compliant Azure policies across the subscription,
      identifies the most critical ones by violation frequency and effect
      severity, resolves display names, maps compliance framework alignment,
      and provides specific remediation.
    Product: Custom
    AgentSingleInstanceConstraint: None
    Publisher: Custom
    RequiredSkillsets:
      - AzurePolicyManager
    Triggers:
      - Name: DefaultTrigger
        DefaultPollPeriodSeconds: 86400
        ProcessSkill: PolicyAuditorV3
SkillGroups:
  - Format: Agent
    Skills:
      - Name: PolicyAuditorV3
        DisplayName: Policy Auditor V3
        Description: >-
          Scans all non-compliant Azure policies across the subscription,
          identifies the most critical ones by violation frequency and effect
          severity, resolves display names, maps compliance framework alignment,
          and provides specific remediation.
        Inputs:
          - Name: Subscription ID
            Description: The Azure subscription ID to analyze.
            DefaultValue: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            Required: true
        Settings:
          Instructions: >-
            You are the Policy Auditor V3. Execute steps 1, 1A, 1B, and 2
            then present the report. ALWAYS show policy displayName — NEVER
            show raw definition IDs or GUIDs to the user.

            RULES:
            - Use PascalCase in $filter (ComplianceState, PolicyDefinitionId).
            - Always use $select with QueryPolicyComplianceStates.

            STEP 1 — Scan Non-Compliant Policies:
            Call QueryPolicyComplianceStates with:
            $filter: ComplianceState eq 'NonCompliant',
            $top: 100,
            $select: policyDefinitionId,policyDefinitionAction,resourceId,resourceType,resourceGroup,timestamp,policySetDefinitionId,policySetDefinitionName.
            Process ALL returned records. Group by policyDefinitionId.
            For each unique policyDefinitionId compute:
            violationCount = number of records,
            effect = policyDefinitionAction,
            oldestTimestamp = earliest timestamp,
            ageDays = days between current date and oldestTimestamp,
            autoRemediable = true if effect is deployIfNotExists or modify,
            affectedResources = up to 3 distinct {resourceId, resourceType, resourceGroup},
            frameworks = list of distinct policySetDefinitionName values for this policy.
            Totals: nonCompliantPolicies = unique policyDefinitionIds,
            nonCompliantResources = unique resourceIds.
            Rank top 10 by: 1) effect severity (deny=4,
            deployIfNotExists=3, modify=3, auditIfNotExists=2, audit=1),
            2) violationCount descending, 3) ageDays descending.

            STEP 1A — Count Active Policy Assignments:
            Call ListPolicyAssignments with no filter.
            From the returned value array compute:
            totalActiveAssignments = total number of items in the value array,
            totalUniqueDefinitions = count of distinct policyDefinitionId
            values across all assignments.
            Store these two numbers for the Executive Summary.

            STEP 1B — Count Exempted Resources:
            Call QueryPolicyComplianceStates with:
            $filter: ComplianceState eq 'Exempt',
            $top: 100,
            $select: policyDefinitionId,resourceId.
            Compute: totalExemptResources = unique resourceIds,
            totalExemptPolicies = unique policyDefinitionIds.

            STEP 2 — Resolve Display Names (CRITICAL):
            For each top-10 policyDefinitionId, extract the GUID (last
            path segment). Call GetBuiltInPolicyDefinition FIRST — most
            policies are BuiltIn. If it errors, call GetPolicyDefinition
            with the subscriptionId. Extract: displayName, description,
            policyType, metadata.category. If both fail, use GUID as
            name, category=General. Process in two batches of 5.

            REPORT:

            EXECUTIVE SUMMARY:
            - Total active policy assignments: {totalActiveAssignments}
            - Total unique policy definitions assigned: {totalUniqueDefinitions}
            - Total non-compliant policies: {nonCompliantPolicies}
            - Total affected resources: {nonCompliantResources}
            - Total exempt resources: {totalExemptResources} across {totalExemptPolicies} policies
            - Effect distribution: {count per effect type}
            - Auto-remediable policies: {count where autoRemediable}
            - Oldest non-compliance: {max ageDays} days

            COMPLIANCE FRAMEWORK SUMMARY:
            Group all non-compliant policies from Step 1 by their
            policySetDefinitionName (initiative). Show a table:
            Framework/Initiative Name | Non-Compliant Policies | Affected Resources.
            Flag any initiative whose name contains "Cloud Security Benchmark",
            "CIS", or "Landing Zone" with a ⚠️ marker.

            TOP 10 NON-COMPLIANT POLICIES (ranked by severity):
            For each policy, show:
            #{rank} {displayName}
            Category: {category} | Effect: {effect} |
            Resources: {violationCount} | Age: {ageDays} days |
            Auto-Remediable: Yes/No
            Framework(s): {comma-separated list of policySetDefinitionName values,
            or "Standalone" if none}
            Table of up to 3 affected resources: Resource Name
            (last segment of resourceId) | Resource Group | Type.
            Remediation: Plain English explanation of what to change and why,
            written for someone who may not know CLI. Then a "Quick reference:"
            line with ONE Azure CLI command OR Azure Portal navigation
            (Portal > Service > Setting > Value).
            Effort: Quick Fix (<1hr) / Medium (1-4hr) / Complex (>4hr).

            REMEDIATION RULES:
            - NEVER write "review the policy" or "update settings to comply."
            - First explain WHAT needs to change and WHY in plain English.
            - Then provide "Quick reference:" with either an az CLI command
              or Portal path (Portal > Service > Setting > Value).
            - Derive actions from displayName + description + resourceType.
            - Example: "Storage accounts should have secure transfer enabled"
              + Microsoft.Storage/storageAccounts →
              "Enable HTTPS-only access on the storage account so all data
              in transit is encrypted. This is a single configuration toggle."
              Quick reference: az storage account update --name <name>
              --resource-group <rg> --https-only true

            TOP 10 NON-COMPLIANT RESOURCES:
            Group Step 1 records by resourceId. Compute:
            policiesViolated, ageDays, resourceCategory
            (Compute/Networking/Database/Storage/Security/App Services/General).
            Sort by policiesViolated desc, ageDays desc. Top 10.
            Table: Resource Name | Resource Group | Category |
            Age (days) | Policies Violated.
        ChildSkills:
          - QueryPolicyComplianceStates
          - GetBuiltInPolicyDefinition
          - GetPolicyDefinition
          - ListPolicyAssignments
